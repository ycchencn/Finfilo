services:

    web:
        image: finfilo-service:latest
        ports:
            - "8080:8080"
        working_dir: /app
        command: python3 /app/run_app.py
        environment:
            ENV: production
            DATABASE_CONN_STR: ${DATABASE_CONN_STR}
            REDIS_HOST: ${REDIS_HOST}
        restart: always

    web_slave:
        image: finfilo-service:latest
        ports:
            - "8081:8080"
        working_dir: /app
        command: python3 /app/run_app.py
        environment:
            ENV: production
            DATABASE_CONN_STR: ${DATABASE_CONN_STR}
            REDIS_HOST: ${REDIS_HOST}
        restart: always

    scheduler:
        image: finfilo-service:latest
        working_dir: /app
        command: python3 /app/scheduler.py
        environment:
            ENV: production
            DATABASE_CONN_STR: ${DATABASE_CONN_STR}
            REDIS_HOST: ${REDIS_HOST}
        restart: always

    job_server:
        image: finfilo-service:latest
        working_dir: /app
        command: python3 /app/job_server_mq.py
        environment:
            ENV: production
            DATABASE_CONN_STR: ${DATABASE_CONN_STR}
            REDIS_HOST: ${REDIS_HOST}
        restart: always

    job_server_slave:
        image: finfilo-service:latest
        working_dir: /app
        command: python3 /app/job_server_mq.py
        environment:
            ENV: production
            DATABASE_CONN_STR: ${DATABASE_CONN_STR}
            REDIS_HOST: ${REDIS_HOST}
        restart: always

    news_server:
        image: finfilo-service:latest
        working_dir: /app
        command: python3 /app/news_server.py
        environment:
            ENV: production
            DATABASE_CONN_STR: ${DATABASE_CONN_STR}
            REDIS_HOST: ${REDIS_HOST}
        restart: always